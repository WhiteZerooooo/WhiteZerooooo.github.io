<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>零の立绘预览</title>
    <style>
      .image-container {
        position: relative;
        width: 500px; /* 假设图片宽度为500px */
        text-align: center;
        transform: scale(1);
      }
      .image-container img {
        position: absolute;
        top: 720px;
        left: 95%;
        transform: translate(-50%, -50%);
      }
      .image1 {
        z-index: 1;
      }
      .image2 {
        z-index: 2;
      }
      .image3 {
        z-index: 3;
      }
      img {
        width: 175%;
        height: auto;
      }
    </style>
  </head>
  <body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
    <div class="image-container">
      <img class="image1" src="Image/card_draw_bg_200001.jpg" alt="Image 1">
      <img class="image2" src="Image/card_draw_200001.png" alt="Image 2">
      <img class="image3" src="Image/card_draw_fg_200001.png" alt="Image 3">
    </div>
  </body>
  <script>
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
    document.addEventListener('mousedown', function(e) {
      if (e.button === 2) {
        e.preventDefault();
      }
    });
    document.addEventListener('touchstart', function(e) {
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    var cardname = urlParams.get('name') || 200001;
    var cardid = urlParams.get('id') || 200001;
    var cardfind = ''
    var cardtype = urlParams.get('type') || '';
    fetch('card.json')
    .then(response => response.json())
    .then(data => {
      // 遍历 JSON 数据，查找与提供的名称匹配的条目，并返回其 ID
      let name = `${cardname}`; // 你要查找的名称
      Object.values(data).forEach(item => {
        if (item.name === name) {
          cardid = item.id;
          cardfind += item.id;
          if (cardtype === 'SP') {
            cardid = cardfind.substr(6, 12);
          } else if (cardtype === 'SP满破') {
            cardid = cardfind.substr(6, 12);
          } else {
            if (cardfind === '') {
              cardid = cardid.substr(0, 6);
            } else {
              cardid = cardfind.substr(0, 6);
            };
          };
          if (cardtype === '1') {
            cardid += '_7';
          } else if (cardtype === '2') {
            cardid += '_8';
          } else if (cardtype === '满破') {
            cardid += '_5';
          } else if (cardtype === 'SP满破') {
            cardid += '_5';
          } else if (cardtype === '花嫁') {
            cardid += '_9';
          } else if (cardtype === '泳装') {
            cardid += '_10';
          } else if (cardtype === '童话') {
            cardid += '_11';
          } else if (cardtype === '春节') {
            cardid += '_12';
          } else if (cardtype === '联动') {
            cardid += '_20';
          };
          const img1 = `Image/card_draw_bg_${cardid}.jpg`;
          const img2 = `Image/card_draw_${cardid}.png`;
          const img3 = `Image/card_draw_fg_${cardid}.png`;
          const image1 = document.querySelector('.image1');
          image1.onload = function() {
            image1.style.display = 'block';
          };
          image1.onerror = function() {
            image1.style.display = 'none';
          };
          image1.src = img1;
          const image2 = document.querySelector('.image2');
          image2.onload = function() {
            image2.style.display = 'block';
          };
          image2.onerror = function() {
            image2.style.display = 'none';
          };
          image2.src = img2;
          const image3 = document.querySelector('.image3');
          image3.onload = function() {
            image3.style.display = 'block';
          };
          image3.onerror = function() {
            image3.style.display = 'none';
          };
          image3.src = img3;
        }
      });
    })
  </script>
</html>

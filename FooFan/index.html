<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>零の导航页</title>
    <style>
      input[type="text"] {
        width: 350px;
        padding: 28px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background-color: #e6e6e6;
        font-size: 28px;
        line-height: 1.5;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #1890ff;
        box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
      }
      .container {
        border: 1px solid #ccc;
        background-color: #f2f2f2;
        padding: 10px;
        width: 835px;
        height: 100%;
        margin: 0 auto;
      }
      select {
        padding: 28px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background-color: #e6e6e6;
        font-size: 28px;
        line-height: 1.5;
        margin-top: 10px;
      }
      .btn1 {
        padding: 20px;
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        background-color: #1890ff;
        color: #fff;
        font-size: 28px;
        line-height: 1.5;
        cursor: pointer;
        margin-top: 10px;
        margin-left: 90px;
      }
      .btn1:hover {
        background-color: #0077c2;
        color: #fff;
      }
      .btn2 {
        padding: 20px;
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        background-color: #1890ff;
        color: #fff;
        font-size: 28px;
        line-height: 1.5;
        cursor: pointer;
        margin-top: 10px;
        margin-left: 10px;
      }
      .btn2:hover {
        background-color: #0077c2;
        color: #fff;
      }
      .btn3 {
        padding: 20px;
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        background-color: #1890ff;
        color: #fff;
        font-size: 28px;
        line-height: 1.5;
        cursor: pointer;
        margin-top: 10px;
        margin-left: 10px;
      }
      .btn3:hover {
        background-color: #0077c2;
        color: #fff;
      }

.gundong {
  position: relative;
  width: 100%;
  height: 70px;
  overflow: hidden;
}

.left {
  position: absolute;
  top: -10px;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #f2f2f2;
  overflow: hidden;
}

.scroll-text {
  position: absolute;
  top: 0;
  right: 100%;
  white-space: nowrap;
  font-size: 20px;
  line-height: 1.5;
  font-weight: bold;
  color: #333;
  animation: scrollText 25s linear infinite;
}

@keyframes scrollText {
  0% {
    left: 100%;
  }
  100% {
    left: -100%;
  }
}
.my-text::before {
  content: "";
  color: red;
  font-size: 20px;
}
.my-text {
  font-size: 20px;
  font-weight: bold;
  color: #333;
}


    </style>
  </head>
  <body>
    <div class="container">
      <div class="gundong">
        <div class="left">
          <p class="scroll-text">
            <big>一个查看Q版/立绘/动态立绘的小工具</big>
            <big>请勿将其分享至官方相关社交平台中</big>
            <big>有Q版无法载入可以向我反馈</big>
          </p>
        </div>
      </div>
      <br>
      <input id="name-input" type="text" placeholder="请输入飨灵名称">
      <input id="id-input" type="text" placeholder="请输入飨灵ID(非必需)">
      <br>
      <big><big><big>皮肤类型：</big></big></big>
      <select id="type-select">
        <option value="">原皮</option>
        <option value="满破">满破</option>
        <option value="SP">SP</option>
        <option value="SP满破">SP满破</option>
        <option value="1">第一张皮</option>
        <option value="2">第二张皮</option>
        <option value="花嫁">花嫁</option>
        <option value="泳装">泳装</option>
        <option value="童话">童话</option>
        <option value="春节">春节</option>
        <option value="联动">联动</option>
      </select>
      <button id="spine-button" class="btn1">Q版</button>
      <button id="image-button" class="btn2">立绘</button>
      <button id="draw-button" class="btn3">动态立绘</button>
      <br><br>
    </div>
    <br>
    <div class="container">
      <p class="my-text">
        近期图透更新：
        <br><br>新增飨灵
        <br>SP慕斯（动态立绘）
        <br>UR天使蛋糕、卡斯提拉
        <br>SR意式奶冻、冰见平安鱼
        <br><br>新增皮肤 
        <br>童话皮：烩面、卡斯提拉、草加仙贝、冰见平安鱼、公主蛋糕、伊顿麦斯
        <br>第一张皮：北极贝、狸猫荞麦面
        <br>
      </p>
    </div>
  </body>
  <script>
    // 获取元素
    const nameInput = document.getElementById('name-input');
    const typeSelect = document.getElementById('type-select');
    const idInput = document.getElementById('id-input');
    const spineButton = document.getElementById('spine-button');
    const imageButton = document.getElementById('image-button');
    const drawButton = document.getElementById('draw-button');
    // 绑定点击事件
    spineButton.addEventListener('click', function() {
      // 获取输入框和下拉菜单的值
      const nameValue = nameInput.value;
      const typeValue = typeSelect.value;
      const idValue = idInput.value;
      // 拼接链接
      const url = `https://whitezerooooo.github.io/FooFan/CardSpineViewer/?name=${nameValue}&type=${typeValue}&id=${idValue}`;
      // 跳转链接
      window.location.href = url;
    });
    imageButton.addEventListener('click', function() {
      // 获取输入框和下拉菜单的值
      const nameValue = nameInput.value;
      const typeValue = typeSelect.value;
      const idValue = idInput.value;
      // 拼接链接
      const url = `https://whitezerooooo.github.io/FooFan/CardImage/?name=${nameValue}&type=${typeValue}&id=${idValue}`;
      // 跳转链接
      window.location.href = url;
    });
    drawButton.addEventListener('click', function() {
      // 获取输入框和下拉菜单的值
      const nameValue = nameInput.value;
      const typeValue = typeSelect.value;
      const idValue = idInput.value;
      // 拼接链接
      const url = `https://whitezerooooo.github.io/FooFan/CardDrawViewer/?name=${nameValue}&type=${typeValue}&id=${idValue}`;
      // 跳转链接
      window.location.href = url;
    });
  </script>
</html>
